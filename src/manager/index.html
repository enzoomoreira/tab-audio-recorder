<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recordings — Tab Audio Recorder</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="layout">
      <header class="header">
        <h1 class="header__title">Recordings</h1>
        <div class="header__controls">
          <input
            type="search"
            id="hostFilter"
            class="input"
            placeholder="Filter by site (e.g. radio.garden)"
            aria-label="Filter by site"
          />
          <div class="select-group">
            <label for="sortField" class="sr-only">Sort by</label>
            <select id="sortField" class="select" aria-label="Sort by">
              <option value="startedAt">Date</option>
              <option value="durationMs">Duration</option>
              <option value="sizeBytes">Size</option>
            </select>
            <label for="sortDir" class="sr-only">Direction</label>
            <select id="sortDir" class="select" aria-label="Sort direction">
              <option value="desc">Newest first</option>
              <option value="asc">Oldest first</option>
            </select>
          </div>
        </div>
      </header>

      <main class="main" id="main">
        <p class="state-msg" id="loadingMsg">Loading...</p>
        <p class="state-msg" id="emptyMsg" hidden>No recordings yet. Go record something!</p>
        <ul class="recording-list" id="list" hidden></ul>
      </main>
    </div>
    <script type="module" src="./index.ts"></script>
  </body>
</html>
