name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: Lint, typecheck, unit, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bunx tsc --noEmit
      - run: bun run test
      - run: bun run build
      - run: bun run lint:ext # AMO validator over dist/

  e2e:
    name: End-to-end (Selenium + Firefox)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: browser-actions/setup-firefox@v1
      - run: bun install --frozen-lockfile
      # The ubuntu-latest runner image no longer provides a usable default audio
      # device, and Firefox's cubeb backend needs a REAL, clocked device to
      # actually play media (a played element only exposes capturable frames while
      # it is really playing). A PulseAudio null sink alone was not enough, so we
      # load snd-aloop -- a kernel ALSA loopback that is a genuine device -- and
      # wire it up for both cubeb backends (alsa default + a PulseAudio sink).
      - name: Provide a real, clocked audio device (snd-aloop)
        run: |
          sudo apt-get update
          sudo apt-get install -y alsa-utils pulseaudio
          sudo modprobe snd-aloop
          # cubeb alsa backend: make the loopback the default ALSA device.
          printf 'pcm.!default {\n  type plug\n  slave.pcm "hw:Loopback,0,0"\n}\nctl.!default {\n  type hw\n  card Loopback\n}\n' | sudo tee /etc/asound.conf >/dev/null
          # Continuously drain the loopback capture side so the playback side
          # never stalls on a full ring buffer.
          arecord -D hw:Loopback,1,0 -f cd -t raw >/dev/null 2>&1 &
          export XDG_RUNTIME_DIR=/run/user/$(id -u)
          sudo mkdir -p "$XDG_RUNTIME_DIR"
          sudo chown "$(id -u):$(id -g)" "$XDG_RUNTIME_DIR"
          chmod 700 "$XDG_RUNTIME_DIR"
          echo "XDG_RUNTIME_DIR=$XDG_RUNTIME_DIR" >> "$GITHUB_ENV"
          echo "PULSE_SERVER=unix:$XDG_RUNTIME_DIR/pulse/native" >> "$GITHUB_ENV"
          # cubeb pulse backend (Firefox's default when a server is present):
          # back the default sink with the real loopback device.
          pulseaudio -D --exit-idle-time=-1
          pactl load-module module-alsa-sink device=hw:Loopback,0,0 sink_name=Loopback
          pactl set-default-sink Loopback
          pactl list short sinks
          aplay -l || true
      # The fixture launches Firefox headed; xvfb provides a virtual display.
      # geckodriver is the npm dev dependency. globalSetup reaps leaked processes.
      - run: xvfb-run -a bun run test:e2e
