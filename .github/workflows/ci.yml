name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: Lint, typecheck, unit, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bunx tsc --noEmit
      - run: bun run test
      - run: bun run build
      - run: bun run lint:ext # AMO validator over dist/

  e2e:
    name: End-to-end (Selenium + Firefox)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: browser-actions/setup-firefox@v1
      - run: bun install --frozen-lockfile
      # Firefox 152+ produces no captureStream/MediaRecorder data unless its audio
      # backend (cubeb -> PulseAudio on Linux) has a real output sink; the runner
      # has none by default. A null sink is enough for the captured streams to flow.
      - name: Start PulseAudio with a dummy sink
        run: |
          sudo apt-get update
          sudo apt-get install -y pulseaudio
          pulseaudio --start --exit-idle-time=-1
          pactl load-module module-null-sink sink_name=DummyOutput
          pactl set-default-sink DummyOutput
      # The fixture launches Firefox headed; xvfb provides a virtual display.
      # geckodriver is the npm dev dependency. globalSetup reaps leaked processes.
      - run: xvfb-run -a bun run test:e2e
