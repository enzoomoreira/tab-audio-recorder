name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  check:
    name: Lint, typecheck, unit, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bunx tsc --noEmit
      - run: bun run test
      - run: bun run build
      - run: bun run lint:ext # AMO validator over dist/

  # The capture e2e suite needs a real, clocked audio output device: Firefox only
  # exposes capturable frames from a media element while it is actually playing.
  # GitHub-hosted ubuntu runners no longer provide one -- the image dropped its
  # default audio device, a PulseAudio null sink is not enough, and the Azure
  # kernel ships no snd-aloop loopback module -- so this suite cannot pass there.
  # It is run locally before release (`bun run test:e2e`, 12/12 green) and kept
  # here as a manual, non-blocking job (e.g. for a self-hosted runner with audio).
  e2e:
    name: End-to-end (Selenium + Firefox)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: browser-actions/setup-firefox@v1
      - run: bun install --frozen-lockfile
      # The fixture launches Firefox headed; xvfb provides a virtual display.
      # geckodriver is the npm dev dependency. globalSetup reaps leaked processes.
      - run: xvfb-run -a bun run test:e2e
