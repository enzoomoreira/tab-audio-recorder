name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: Lint, typecheck, unit, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bunx tsc --noEmit
      - run: bun run test
      - run: bun run build
      - run: bun run lint:ext # AMO validator over dist/

  e2e:
    name: End-to-end (Selenium + Firefox)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: browser-actions/setup-firefox@v1
        with:
          # ISOLATION EXPERIMENT: hold the (refactored) code constant and vary
          # only the browser. 152.0 fails here; 151.0.2 was the last green CI.
          firefox-version: 151.0.2
      - run: bun install --frozen-lockfile
      # Firefox 152+ produces no captureStream/MediaRecorder data unless its audio
      # backend (cubeb -> PulseAudio on Linux) has a real output sink; the runner
      # has none by default. Start a PulseAudio daemon with a null sink and pin
      # XDG_RUNTIME_DIR (exported to GITHUB_ENV) so the Firefox launched in the
      # next step, under xvfb-run, connects to the same socket the daemon created.
      - name: Start PulseAudio with a dummy sink
        run: |
          sudo apt-get update
          sudo apt-get install -y pulseaudio
          export XDG_RUNTIME_DIR=/run/user/$(id -u)
          sudo mkdir -p "$XDG_RUNTIME_DIR"
          sudo chown "$(id -u):$(id -g)" "$XDG_RUNTIME_DIR"
          chmod 700 "$XDG_RUNTIME_DIR"
          echo "XDG_RUNTIME_DIR=$XDG_RUNTIME_DIR" >> "$GITHUB_ENV"
          # Point Firefox's cubeb backend straight at the daemon's socket instead
          # of relying on XDG_RUNTIME_DIR discovery alone (the socket is created
          # below at $XDG_RUNTIME_DIR/pulse/native).
          echo "PULSE_SERVER=unix:$XDG_RUNTIME_DIR/pulse/native" >> "$GITHUB_ENV"
          pulseaudio -D --exit-idle-time=-1
          pactl load-module module-null-sink sink_name=DummyOutput
          pactl set-default-sink DummyOutput
          pactl list short sinks
      # The fixture launches Firefox headed; xvfb provides a virtual display.
      # geckodriver is the npm dev dependency. globalSetup reaps leaked processes.
      - run: xvfb-run -a bun run test:e2e
