<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>01 - audio src direct</title>
    <script src="lib/audio.js"></script>
  </head>
  <body>
    <h1>01 - &lt;audio src=&quot;blob:wav&quot;&gt; direct</h1>
    <p>Expected strategy: <strong>DOM</strong></p>
    <audio id="player" controls></audio>
    <button data-testid="start">Start audio</button>
    <script>
      window.__expected = { strategy: 'DOM', technique: 'audio-src-direct' };
      const player = document.getElementById('player');
      player.src = window.sineWavUrl(10, 440);
      player.loop = true;
      window.__startAudio = () => player.play();
      window.__stopAudio = () => player.pause();
      document
        .querySelector('[data-testid="start"]')
        .addEventListener('click', () => window.__startAudio());

      // Cross-origin parent (page 09) reaches us via postMessage.
      window.addEventListener('message', (event) => {
        if (event.data === 'START') window.__startAudio();
        if (event.data === 'STOP') window.__stopAudio();
      });
    </script>
  </body>
</html>
